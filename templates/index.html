<!DOCTYPE html>
<html>
<head>
    <title>Gerador de Recibo PJ</title>

    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 40px;
        }

        h2 {
            text-align: center;
        }

        form {
            max-width: 400px;
            margin: auto;
            border: 1px solid #00ff00;
            padding: 20px;
            box-shadow: 0 0 15px #00ff00;
        }

        input, select, button {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            background: black;
            border: 1px solid #00ff00;
            color: #00ff00;
        }

        button:hover {
            background: #00ff00;
            color: black;
            cursor: pointer;
        }

        label {
            font-size: 14px;
        }
    </style>

</head>
<body>

    <h2>⚡ GERADOR DE RECIBOS - RH ⚡</h2>

    <form method="POST" enctype="multipart/form-data">

        <!-- 📄 PLANILHA PRINCIPAL -->
        <label>Selecionar Planilha (Recibos):</label>
        <input type="file" name="file" required>

        <!-- 🖼️ MELHORIA (SEM MUDAR LAYOUT) -->
        <label>Planilha de Comissão (gera imagens por aba - colunas A:B):</label>
        <input type="file" name="file_imagens">

        <label>Mês da Competência:</label>
        <select name="mes" required>
            {% for mes in meses %}
                <option value="{{ mes }}" {% if mes == mes_atual %}selected{% endif %}>
                    {{ mes }}
                </option>
            {% endfor %}
        </select>

        <label>Data do Recibo:</label>
        <input type="date" name="data_recibo" required>

        <button type="submit">Gerar Recibos + Imagens</button>

    </form>

</body>
</html>
