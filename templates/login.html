<!DOCTYPE html>
<html>
<head>
    <title>Sistema RH</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #001100, #000000);
            font-family: 'Courier New', monospace;
            color: #2596BE;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* EFEITO GRID FUNDO */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(#003300 1px, transparent 1px),
                              linear-gradient(90deg, #003300 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.2;
        }

        .box {
            position: relative;
            border: 2px solid #2596BE;
            padding: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 20px #2596BE;
            background: rgba(0, 0, 0, 0.85);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 10px #2596BE;
            }
            to {
                box-shadow: 0 0 30px #2596BE;
            }
        }

        h2 {
            margin-bottom: 20px;
            text-shadow: 0 0 10px #2596BE;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            margin: 12px 0;
            padding: 10px;
            background: black;
            border: 1px solid #2596BE;
            color: #2596BE;
            outline: none;
        }

        input::placeholder {
            color: #2596BE;
        }

        button {
            width: 100%;
            padding: 10px;
            background: black;
            color: #2596BE;
            border: 1px solid #2596BE;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2596BE;
            color: black;
            box-shadow: 0 0 15px #2596BE;
        }

        /* TEXTO DIGITANDO */
        .typing {
            font-size: 14px;
            margin-bottom: 15px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #2596BE;
            width: 0;
            animation: typing 3s steps(30, end) forwards, blink 0.7s infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }
    </style>

</head>
<body>

<div class="box">

    <h2>  Recursos Humanos </h2>

    <div class="typing">
        Inicializando sistema...
    </div>

    <form method="POST" action="/login">
        <input type="text" name="usuario" placeholder="Usuário" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">ACESSAR</button>
    </form>

</div>

</body>
</html>
